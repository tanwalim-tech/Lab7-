<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<title>Register Form</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    height:100vh;
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;

    /* พื้นหลังรูปภาพ */
    background-image: url("https://images.unsplash.com/photo-1503264116251-35a269479413");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

.form-box{
    width:420px;
    background:white;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
    overflow:hidden;
}

.form-header{
    background:#2f64c8;
    color:white;
    padding:15px;
    font-size:20px;
    font-weight:bold;
}

.top-buttons{
    position:absolute;
    top:20px;
}

</style>

</head>
<body>

<div class="top-buttons">
    <button class="btn btn-warning">Play</button>
    <button class="btn btn-danger">Pause</button>
</div>

<div class="form-box">

<div class="form-header">
แบบฟอร์มลงทะเบียน
</div>

<div class="p-4">

<div class="mb-3">
<label class="form-label">ชื่อ-นามสกุล</label>
<input type="text" class="form-control" placeholder="กรุณากรอกชื่อ-นามสกุล">
</div>

<div class="mb-3">
<label class="form-label">อีเมล</label>
<input type="email" class="form-control" placeholder="example@domain.com">
</div>

<div class="mb-3">
<label class="form-label">รหัสผ่าน</label>
<input type="password" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">เพศ</label><br>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">ชาย</label>
</div>

<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">หญิง</label>
</div>

</div>

<div class="mb-3">
<label class="form-label">ตำแหน่ง</label>
<select class="form-select">
<option>Please select a position</option>
<option>Programmer</option>
<option>Designer</option>
<option>Manager</option>
</select>
</div>

<button class="btn btn-success">ลงทะเบียน</button> <button class="btn btn-danger">ล้างข้อมูล</button>

</div>
</div>

</body>
</html>
